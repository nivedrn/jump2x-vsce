name: Release and Publish Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve metadata
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # Ensure this matches your Marketplace Publisher ID exactly
          PUBLISHER=$(node -p "require('./package.json').publisher")
          NAME=$(node -p "require('./package.json').name")
          
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ext_id=$PUBLISHER.$NAME" >> "$GITHUB_OUTPUT"
          echo "vsix_file=$NAME-$VERSION.vsix" >> "$GITHUB_OUTPUT"

      - name: Check Marketplace Version
        id: check
        run: |
          # Use || true so the step doesn't fail if the version isn't found
          # We check if the specific version exists in the marketplace JSON
          EXISTS=$(npx vsce show ${{ steps.meta.outputs.ext_id }} --json | jq ".versions[] | select(.version == \"${{ steps.meta.outputs.version }}\")" | jq -r '.version' || echo "")
          
          if [ "$EXISTS" = "${{ steps.meta.outputs.version }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package VSIX
        if: steps.check.outputs.exists == 'false'
        run: npx vsce package --allow-missing-repository --skip-license --out "${{ steps.meta.outputs.vsix_file }}"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: v${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.meta.outputs.vsix_file }}

      - name: Publish to VS Code Marketplace
        if: steps.check.outputs.exists == 'false'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "Error: VSCE_PAT is not set in GitHub Secrets."
            exit 1
          fi
          npx vsce publish --packagePath "${{ steps.meta.outputs.vsix_file }}" -p "$VSCE_PAT" --no-verify

      - name: Skip Logic
        if: steps.check.outputs.exists == 'true'
        run: echo "Version ${{ steps.meta.outputs.version }} is already on Marketplace. Nothing to do."